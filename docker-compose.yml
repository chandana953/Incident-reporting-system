version: '3.9'

services:
  # ── Backend ────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: incidentiq-backend
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - CLIENT_URL=http://localhost:80
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - incidentiq-network

  # ── Frontend ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: incidentiq-frontend
    ports:
      - '80:80'
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - incidentiq-network

networks:
  incidentiq-network:
    driver: bridge
